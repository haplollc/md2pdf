			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Auto-bump CFBundleVersion on Release archives so App Store Connect\n# never sees the same build number twice. Uses git commit count, which\n# is strictly monotonic. No-op for Debug builds so dev iteration is fast.\nif [ \"${CONFIGURATION}\" != \"Release\" ]; then\n  echo \"Skipping CFBundleVersion bump for ${CONFIGURATION} build.\"\n  exit 0\nfi\n\nPLIST=\"${TARGET_BUILD_DIR}/${INFOPLIST_PATH}\"\nif [ ! -f \"${PLIST}\" ]; then\n  echo \"warning: Info.plist not found at ${PLIST} — skipping bump.\"\n  exit 0\nfi\n\ncd \"${SRCROOT}\"\nif ! git rev-parse --git-dir >/dev/null 2>&1; then\n  echo \"warning: ${SRCROOT} is not a git repo — skipping bump.\"\n  exit 0\nfi\n\nBUILD_NUMBER=$(git rev-list --count HEAD)\necho \"Setting CFBundleVersion to ${BUILD_NUMBER} in ${PLIST}\"\n/usr/libexec/PlistBuddy -c \"Set :CFBundleVersion ${BUILD_NUMBER}\" \"${PLIST}\"\n";
		};
/* End PBXShellScriptBuildPhase section */

